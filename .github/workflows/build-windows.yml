name: Build All Platforms

on:
  workflow_dispatch:  # Manual trigger from GitHub website
  push:
    branches: [main]
    tags: ['v*']     # Also build + release on version tags

jobs:
  build-windows-x64:
    name: Windows x64 Build
    runs-on: windows-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          python -m pip install -r requirements.txt
          python -m pip install pyinstaller reportlab

      - name: Build with PyInstaller
        run: python -m PyInstaller astrostacker.spec --clean

      - name: Generate PDF manual
        run: python make_manual_pdf.py
        env:
          PYTHONIOENCODING: utf-8

      - name: Include docs
        run: |
          copy README_plain.txt "dist\Hayseys Astrostacker\README.txt"
          copy GETTING_STARTED.txt "dist\Hayseys Astrostacker\GETTING_STARTED.txt"
          copy USER_MANUAL.txt "dist\Hayseys Astrostacker\USER_MANUAL.txt"
          copy USER_MANUAL.pdf "dist\Hayseys Astrostacker\USER_MANUAL.pdf"

      - name: Upload Windows build
        uses: actions/upload-artifact@v4
        with:
          name: Hayseys-Astrostacker-Windows-x64
          path: dist/Hayseys Astrostacker/
          retention-days: 90

  build-macos-apple-silicon:
    name: macOS Apple Silicon Build
    runs-on: macos-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          python -m pip install -r requirements.txt
          python -m pip install pyinstaller reportlab

      - name: Build with PyInstaller
        run: python -m PyInstaller astrostacker.spec --clean

      - name: Generate PDF manual
        run: python3 make_manual_pdf.py

      - name: Zip macOS app bundle with docs
        run: |
          cp README_plain.txt dist/README.txt
          cp GETTING_STARTED.txt dist/GETTING_STARTED.txt
          cp USER_MANUAL.txt dist/USER_MANUAL.txt
          cp USER_MANUAL.pdf dist/USER_MANUAL.pdf
          cd dist && zip -r -y "../Hayseys-Astrostacker-macOS-AppleSilicon.zip" "Hayseys Astrostacker.app" "README.txt" "GETTING_STARTED.txt" "USER_MANUAL.txt" "USER_MANUAL.pdf"

      - name: Upload macOS Apple Silicon build
        uses: actions/upload-artifact@v4
        with:
          name: Hayseys-Astrostacker-macOS-AppleSilicon
          path: Hayseys-Astrostacker-macOS-AppleSilicon.zip
          retention-days: 90

  build-linux-x64:
    name: Linux x86_64 Build
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install system dependencies (Qt6)
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            libgl1 \
            libglx-mesa0 \
            libegl1 \
            libxkbcommon0 \
            libdbus-1-3 \
            libxcb-cursor0 \
            libxcb-icccm4 \
            libxcb-keysyms1 \
            libxcb-shape0 \
            libxcb-render-util0 \
            libxcb-xfixes0 \
            libxcb-xinerama0 \
            libxcb-xkb1 \
            libxkbcommon-x11-0 \
            libfontconfig1 \
            zlib1g

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          python -m pip install -r requirements.txt
          python -m pip install pyinstaller reportlab

      - name: Build with PyInstaller
        run: python -m PyInstaller astrostacker.spec --clean

      - name: Generate PDF manual
        run: python3 make_manual_pdf.py

      - name: Package Linux app
        run: |
          cp README_plain.txt "dist/Hayseys Astrostacker/README.txt"
          cp GETTING_STARTED.txt "dist/Hayseys Astrostacker/GETTING_STARTED.txt"
          cp USER_MANUAL.txt "dist/Hayseys Astrostacker/USER_MANUAL.txt"
          cp USER_MANUAL.pdf "dist/Hayseys Astrostacker/USER_MANUAL.pdf"
          cd dist && tar -czf "../Hayseys-Astrostacker-Linux-x64.tar.gz" "Hayseys Astrostacker/"

      - name: Upload Linux build
        uses: actions/upload-artifact@v4
        with:
          name: Hayseys-Astrostacker-Linux-x64
          path: Hayseys-Astrostacker-Linux-x64.tar.gz
          retention-days: 90

  build-macos-intel:
    name: macOS Intel Build
    runs-on: macos-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Python (x86_64 via Rosetta)
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          architecture: "x64"

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          python -m pip install -r requirements.txt
          python -m pip install pyinstaller reportlab

      - name: Build with PyInstaller
        run: python -m PyInstaller astrostacker.spec --clean

      - name: Generate PDF manual
        run: python3 make_manual_pdf.py

      - name: Zip macOS app bundle with docs
        run: |
          cp README_plain.txt dist/README.txt
          cp GETTING_STARTED.txt dist/GETTING_STARTED.txt
          cp USER_MANUAL.txt dist/USER_MANUAL.txt
          cp USER_MANUAL.pdf dist/USER_MANUAL.pdf
          cd dist && zip -r -y "../Hayseys-Astrostacker-macOS-Intel.zip" "Hayseys Astrostacker.app" "README.txt" "GETTING_STARTED.txt" "USER_MANUAL.txt" "USER_MANUAL.pdf"

      - name: Upload macOS Intel build
        uses: actions/upload-artifact@v4
        with:
          name: Hayseys-Astrostacker-macOS-Intel
          path: Hayseys-Astrostacker-macOS-Intel.zip
          retention-days: 90

  # Create a GitHub Release with all platform builds when a version tag is pushed
  release:
    name: Create GitHub Release
    needs:
      - build-windows-x64
      - build-macos-apple-silicon
      - build-linux-x64
      - build-macos-intel
    runs-on: ubuntu-latest
    if: startsWith(github.ref, 'refs/tags/v')

    permissions:
      contents: write

    steps:
      - name: Download all artifacts
        uses: actions/download-artifact@v4
        with:
          path: release-assets/

      - name: Package Windows release zip
        run: |
          cd "release-assets/Hayseys-Astrostacker-Windows-x64"
          zip -r "../../Hayseys-Astrostacker-Windows-x64.zip" .

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          name: "Haysey's Astrostacker ${{ github.ref_name }} — Beta Bronze"
          body: |
            ## Haysey's Astrostacker ${{ github.ref_name }} — Beta Bronze

            First full release of Haysey's Astrostacker. Download the correct build for your platform below.

            ### Download
            | Platform | File |
            |----------|------|
            | 🍎 macOS Apple Silicon (M1/M2/M3/M4) | `Hayseys-Astrostacker-macOS-AppleSilicon.zip` |
            | 🍎 macOS Intel (pre-2021) | `Hayseys-Astrostacker-macOS-Intel.zip` |
            | 🪟 Windows x64 | `Hayseys-Astrostacker-Windows-x64.zip` |
            | 🐧 Linux x86_64 | `Hayseys-Astrostacker-Linux-x64.tar.gz` |

            ### Installation
            See the [README](https://github.com/haysey/astrostacker#readme) for full installation instructions for each platform.

            ---
            © Andrew Hayes — free for personal non-commercial use. See LICENSE for details.
          files: |
            release-assets/Hayseys-Astrostacker-macOS-AppleSilicon/Hayseys-Astrostacker-macOS-AppleSilicon.zip
            release-assets/Hayseys-Astrostacker-macOS-Intel/Hayseys-Astrostacker-macOS-Intel.zip
            Hayseys-Astrostacker-Windows-x64.zip
            release-assets/Hayseys-Astrostacker-Linux-x64/Hayseys-Astrostacker-Linux-x64.tar.gz
          draft: false
          prerelease: false
